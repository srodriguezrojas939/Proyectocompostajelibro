  <img src="https://cdn.pixabay.com/photo/2018/05/15/22/03/banana-peel-3404376_960_720.jpg" class="draggable" alt="banana-peel" draggable="true" height="300px" id="peel">

  <img src="https://cdn.pixabay.com/photo/2017/07/01/15/02/packaging-2461743_960_720.jpg" class="draggable" alt="bubblewrap" draggable="true" height="300px" id="bubble-wrap">
