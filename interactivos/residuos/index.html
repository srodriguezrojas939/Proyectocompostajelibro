<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <title>TITULO</title>
  <script type="text/javascript" src="lib/descartes-min.js" charset="utf-8"></script>
</head>

<body style="padding:0; margin:0; background:#eff0f1;">

  <div align="center">
    <ajs name="Descartes" code="Descartes" width="720" height="520">
      <param name="tamaño" value="720x520">
      <param name="decimal_symbol" value=".">
      <param name="expand" value="fit">
      <param name="nombre" value="">
      <param name="Versión" value="5.5">
      <param name="editable" value="no">
      <param name="Idioma" value="español">
      <param name="Botones" value="créditos=no config=no inicio=no limpiar=no filas_norte=0 filas_sur=0 ancho_este=150 ancho_oeste=150 alto=40 ">
      <param name="E_01" value="tipo='R2' id='E1' ancho='100%' alto='100%' fijo='sí' fondo='f0eeed' red='no' red10='no' ejes='no' ">
      <param name="E_02" value="tipo='HTMLIFrame' id='E2' y='15%' ancho='100%' alto='85%' archivo='[file]' ">
      <param name="C_01" value="id='b1' interfaz='botón' tipo='numérico' región='interior' espacio='E1' nombre='Nivel 1' expresión='(40,40,80,30)' color='ffffff' color-int='00a9ff' fuente puntos='20' acción='calcular' parámetro='file=&squot;nivel1.html&squot;' extra_style='borderRadius=12|overColor=f00|flat=1' ">
      <param name="C_02" value="id='b2' interfaz='botón' tipo='numérico' región='interior' espacio='E1' nombre='Nivel 2' expresión='((E1._w-80)/2,40,80,30)' color='ffffff' color-int='00a9ff' fuente puntos='20' acción='calcular' parámetro='file=&squot;nivel2.html&squot;' extra_style='borderRadius=12|overColor=f00|flat=1' ">
      <param name="C_03" value="id='b3' interfaz='botón' tipo='numérico' región='interior' espacio='E1' nombre='Nivel 3' expresión='(E1._w-80-40,40,80,30)' color='ffffff' color-int='00a9ff' fuente puntos='20' acción='calcular' parámetro='file=&squot;nivel3.html&squot;' extra_style='borderRadius=12|overColor=f00|flat=1' ">
      <param name="A_01" value="id='INICIO' algoritmo='sí' evaluar='una-sola-vez' hacer='file=&squot;nivel1.html&squot;' ">
      <param name="A_02" value="id='CALCULOS' algoritmo='sí' evaluar='siempre' ">
      <param name="G_01" value="espacio='E1' tipo='texto' color='00ffff' coord_abs='no' expresión='(0,5)' texto='¡Puedes cambiar el nivel!' ancho='1' fuente puntos='22' align='a_left' anchor='a_center_center' shadowColor='000000' shadowBlur='1' shadowOffsetX='2' shadowOffsetY='1' ">
    </ajs>
  </div>

</html>
