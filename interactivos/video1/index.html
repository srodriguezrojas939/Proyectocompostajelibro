<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <title>TITULO</title>
  <script type="text/javascript" src="lib/descartes-min.js" charset="utf-8"></script>
</head>

<body style="padding:0; margin:0; background:#eff0f1;">

  <div align="center">
    <ajs name="Descartes" code="Descartes" width="970" height="550">
      <param name="tamaño" value="970x550">
      <param name="decimal_symbol" value=".">
      <param name="expand" value="fit">
      <param name="nombre" value="">
      <param name="Versión" value="5.5">
      <param name="editable" value="no">
      <param name="Idioma" value="español">
      <param name="Botones" value="créditos=no config=no inicio=no limpiar=no filas_norte=0 filas_sur=0 ancho_este=150 ancho_oeste=150 alto=40 ">
      <param name="E_01" value="tipo='R2' id='E1' ancho='100%' alto='100%' imagen='img/i5.png' despl_imagen='expand.' fondo='000000' red='no' red10='no' ejes='no' ">
      <param name="E_02" value="tipo='HTMLIFrame' id='E2' y='10%' ancho='100%' alto='90%' dibujar-si='file!=&squot;&squot;' archivo='[file]' ">
      <param name="C_01" value="id='b1' interfaz='botón' tipo='numérico' región='interior' espacio='E1' nombre='Video 1' expresión='(20,10,100,40)' color='ffffff' color-int='00afff' fuente puntos='22' acción='calcular' parámetro='file=&squot;videos/video1.mp4&squot;' ">
      <param name="C_02" value="id='b2' interfaz='botón' tipo='numérico' región='interior' espacio='E1' nombre='Video 2' expresión='(850,10,100,40)' color='ffffff' color-int='00afff' fuente puntos='22' acción='calcular' parámetro='file=&squot;videos/video2.mp4&squot;' ">
      <param name="A_01" value="id='INICIO' algoritmo='sí' evaluar='una-sola-vez' ">
      <param name="A_02" value="id='CALCULOS' algoritmo='sí' evaluar='siempre' ">
      <param name="G_01" value="espacio='E1' tipo='texto' color='ffffff' coord_abs='no' expresión='(0,5.5)' texto='Selecciona el video' ancho='1' fuente puntos='30' align='a_left' anchor='a_top_center' ">
    </ajs>
  </div>



</body>
</html>
